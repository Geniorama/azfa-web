# Cabeceras de seguridad HTTP — portadas 1:1 desde netlify.toml ([[headers]] /*).
#
# Se instala en /etc/nginx/snippets/azfa-security-headers.conf y se incluye
# tanto a nivel de `server` como dentro de cada `location` que fije su propio
# add_header (Nginx NO hereda add_header hacia locations que definen los suyos).
#
# NOTA sobre la CSP: usa 'unsafe-inline'/'unsafe-eval' porque Next.js, GTM,
# Google Maps y AOS inyectan scripts/estilos inline. Aun así restringe los
# dominios de origen (script-src/connect-src/frame-src) y bloquea object/base/
# framing. Endurecer con nonces es un paso posterior, no durante la migración.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com https://maps.gstatic.com https://www.google.com https://www.gstatic.com https://translate.google.com https://translate.googleapis.com; connect-src 'self' https://cms.asociacionzonasfrancas.org https://maps.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://translate.googleapis.com https://*.googleapis.com; frame-src 'self' https://www.youtube.com https://player.vimeo.com https://www.google.com https://td.doubleclick.net https://www.googletagmanager.com; media-src 'self' https: blob:; worker-src 'self' blob:;" always;
