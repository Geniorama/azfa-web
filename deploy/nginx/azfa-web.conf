# =============================================================================
# Nginx — origen de azfa-web en EC2 (detrás de Cloudflare, proxy naranja)
# =============================================================================
# Flujo:  Internet ── HTTPS ──> Cloudflare (TLS edge, cachea estáticos)
#                 ── HTTPS ──> este Nginx (:443) ── proxy ──> Next :3000 (PM2)
#
# Reemplaza a netlify.toml: porta los redirects 301, el www→apex, las cabeceras
# de seguridad/CSP y el Cache-Control de estáticos.
#
# TLS de origen: certificado **Cloudflare Origin CA** (15 años, sin renovación;
# solo lo confía Cloudflare, no navegadores — por eso todo pasa por el proxy).
# En Cloudflare el modo SSL debe ser "Full (strict)".
#
# Instalar en /etc/nginx/sites-available/azfa-web y enlazar a sites-enabled.
# `origin.asociacionzonasfrancas.org` es un alias (proxied) para probar el
# origen antes del corte de DNS del dominio principal.
# =============================================================================

# IP real del visitante: detrás del proxy, $remote_addr es la IP del edge de
# Cloudflare; la del cliente llega en CF-Connecting-IP. Fallback a $remote_addr
# para accesos que no pasen por Cloudflare.
map $http_cf_connecting_ip $client_real_ip {
  ""      $remote_addr;
  default $http_cf_connecting_ip;
}

# Compresión (Cloudflare también comprime; esto cubre acceso directo al origen).
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json
           image/svg+xml application/xml application/rss+xml;

# ---- HTTP :80 → HTTPS :443 (Cloudflare Full strict solo habla al :443) ------
server {
  listen 80;
  listen [::]:80;
  server_name asociacionzonasfrancas.org www.asociacionzonasfrancas.org
              origin.asociacionzonasfrancas.org;
  return 301 https://$host$request_uri;
}

# ---- www → apex (redirect que antes hacía Netlify) ---------------------------
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.asociacionzonasfrancas.org;

  ssl_certificate     /etc/ssl/cloudflare/asociacionzonasfrancas.org.pem;
  ssl_certificate_key /etc/ssl/cloudflare/asociacionzonasfrancas.org.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  return 301 https://asociacionzonasfrancas.org$request_uri;
}

server {
  # `listen ... http2` (y no `http2 on;`) por compatibilidad: Ubuntu 24.04
  # trae nginx 1.24 y la directiva `http2 on` existe solo desde 1.25.1.
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name asociacionzonasfrancas.org origin.asociacionzonasfrancas.org;

  # --- TLS de origen (Cloudflare Origin CA: apex + *.asociacionzonasfrancas.org)
  ssl_certificate     /etc/ssl/cloudflare/asociacionzonasfrancas.org.pem;
  ssl_certificate_key /etc/ssl/cloudflare/asociacionzonasfrancas.org.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Cabeceras de seguridad + CSP en todas las respuestas HTML (proxy).
  include snippets/azfa-security-headers.conf;

  # Subida de formularios (contacto, portal de afiliados).
  client_max_body_size 10m;

  # ===========================================================================
  # REDIRECCIONES 301 — URLs heredadas (Grav/Joomla). Portadas de netlify.toml.
  # El orden importa: los `location` regex se evalúan de arriba a abajo y gana
  # el primero que coincide → específicos antes que catch-alls.
  # ===========================================================================

  # --- Sala de prensa: noticias (exacto + /*) --------------------------------
  location ~ ^/informacion/noticias(/|$) { return 301 /sala-de-prensa/noticias; }
  location ~ ^/11-noticias(/|$)          { return 301 /sala-de-prensa/noticias; }

  # --- Newsletter / boletines ------------------------------------------------
  location ~ ^/informacion/boletines(/|$) { return 301 /sala-de-prensa/newsletter; }

  # --- Webinars / AZFA Talks → Eventos ---------------------------------------
  location ~ ^/informacion/webinars(/|$) { return 301 /eventos; }

  # --- Estadísticas ----------------------------------------------------------
  location ~ ^/informacion/estadisticas(/|$) { return 301 /invierta-en-zonas-francas/estadisticas; }

  # --- Publicaciones y estudios ----------------------------------------------
  location ~ ^/informacion/publicaciones(/|$) { return 301 /invierta-en-zonas-francas/publicaciones; }
  # `estudios*` (prefijo abierto): cubre estudios, estudiosBanrep, estudios.Banco…
  location ~ ^/informacion/estudios          { return 301 /invierta-en-zonas-francas/publicaciones; }

  # --- Resto de /informacion → noticias (catch-all, va al final del grupo) ---
  location ~ ^/informacion(/|$) { return 301 /sala-de-prensa/noticias; }

  # --- Eventos: /eventos/* → /eventos (equivale al force=true de Netlify) -----
  # `^/eventos/` NO matchea /eventos exacto, que es una ruta real de Next.
  location ~ ^/eventos/ { return 301 /eventos; }

  # --- Invierta: subsecciones ------------------------------------------------
  location = /invierta/directorio                { return 301 /nuestros-afiliados; }
  location ~ ^/invierta/directorio/              { return 301 /nuestros-afiliados; }
  location = /invierta/normatividad              { return 301 /invierta-en-zonas-francas/normativa-legal; }
  location = /invierta/cifras                     { return 301 /invierta-en-zonas-francas/estadisticas; }
  location = /invierta/acceda-a-las-zonas-francas { return 301 /invierta-en-zonas-francas; }
  location ~ ^/invierta(/|$)                      { return 301 /invierta-en-zonas-francas; }

  # --- Blog → hub del blog ---------------------------------------------------
  location ~ ^/blog(/|$) { return 301 /sala-de-prensa/blog; }

  # --- Afiliados / login -----------------------------------------------------
  location = /afiliados/login { return 301 /auth/login; }
  location ~ ^/afiliados(/|$)  { return 301 /portal-afiliados; }

  # --- Pagos / Haga parte ----------------------------------------------------
  location = /pagos            { return 301 /portal-afiliados; }
  location = /haga-parte-de-azfa { return 301 /nuestros-afiliados; }

  # --- Index legacy (Joomla) -------------------------------------------------
  location ~ ^/index\.php(/|$) { return 301 /; }
  location = /index            { return 301 /; }

  # --- Estructura antigua de Grav (/user/*) ----------------------------------
  location ~ ^/user/pages/  { return 301 /nuestros-afiliados; }
  location ~ ^/user/themes/ { return 301 /invierta-en-zonas-francas/publicaciones; }
  location ~ ^/user/        { return 301 /; }

  # --- Archivos antiguos /media, /biblioteca, /presentaciones ----------------
  location ~ ^/media/            { return 301 /invierta-en-zonas-francas/publicaciones; }
  location ~ ^/biblioteca(/|$)   { return 301 /invierta-en-zonas-francas/publicaciones; }
  location ~ ^/presentaciones(/|$) { return 301 /invierta-en-zonas-francas/publicaciones; }

  # --- Eliminación de prefijos de idioma -------------------------------------
  # El sitio nuevo usa Google Translate (no segmentos /es/, /en/…). Se elimina
  # el prefijo y el navegador re-solicita la ruta limpia (que pasará por las
  # reglas anteriores si aplica; puede haber un 2.º 301, es correcto).
  location ~ ^/(es|en|pt|fr|zh-hans)/(.*)$ { return 301 /$2; }
  location ~ ^/(es|en|pt|fr|zh-hans)$      { return 301 /; }

  # ===========================================================================
  # ESTÁTICOS con Cache-Control (parity con netlify.toml). Servidos por Next,
  # así que van por proxy. Se re-incluye el snippet de seguridad porque este
  # bloque define su propio add_header y Nginx no lo heredaría.
  # ===========================================================================

  # Assets con hash de Next → inmutables 1 año. (Next ya lo envía por defecto;
  # se fija explícito para reforzar el TTL en el edge de Cloudflare.)
  location /_next/static/ {
    include snippets/azfa-security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Fuentes autohospedadas y estáticas → inmutables 1 año.
  location ~* \.woff2$ {
    include snippets/azfa-security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Imágenes/SVG de /public → 30 días + revalidación. (Las del CMS pasan por
  # /_next/image y usan el TTL de next.config.ts, no este bloque.)
  location ~* \.(svg|jpg|jpeg|png|webp)$ {
    include snippets/azfa-security-headers.conf;
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # ===========================================================================
  # PROXY a Next.js (todo lo demás: HTML SSR, /_next/image, API routes, webhook)
  # ===========================================================================
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    # IP real del visitante (ver map de CF-Connecting-IP arriba).
    proxy_set_header X-Real-IP $client_real_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Cloudflare ya forzó HTTPS al usuario; informamos al server de Next.
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
  }
}
