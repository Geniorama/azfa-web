  to = "/sala-de-prensa/blog"
  status = 301

# -----------------------------------------------------------------------------
# Afiliados / Login
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/afiliados/login"
  to = "/auth/login"
  status = 301

[[redirects]]
  from = "/afiliados/*"
  to = "/portal-afiliados"
  status = 301

[[redirects]]
  from = "/afiliados"
  to = "/portal-afiliados"
  status = 301

# -----------------------------------------------------------------------------
# Pagos → Portal de afiliados
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/pagos"
  to = "/portal-afiliados"
  status = 301

# -----------------------------------------------------------------------------
# Haga parte de AZFA → Nuestros afiliados
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/haga-parte-de-azfa"
  to = "/nuestros-afiliados"
  status = 301

# -----------------------------------------------------------------------------
# Index legacy (Joomla)
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/index.php/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/index.php"
  to = "/"
  status = 301

[[redirects]]
  from = "/index"
  to = "/"
  status = 301

# -----------------------------------------------------------------------------
# Estructura antigua de Grav CMS (/user/pages/04.invierta/01.directorio/...)
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/user/pages/*"
  to = "/nuestros-afiliados"
  status = 301

# /user/themes/azfa/documents/... → documentos/revistas → publicaciones
[[redirects]]
  from = "/user/themes/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

# Catch-all para cualquier otro interno de Grav bajo /user/*
[[redirects]]
  from = "/user/*"
  to = "/"
  status = 301

# -----------------------------------------------------------------------------
# Archivos antiguos /media/* (PDFs, revistas, estadísticas-pais)
# y /presentaciones/*
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/media/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

# -----------------------------------------------------------------------------
# Biblioteca antigua de documentos/estudios → publicaciones
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/biblioteca"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

[[redirects]]
  from = "/biblioteca/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

[[redirects]]
  from = "/presentaciones/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

[[redirects]]
  from = "/presentaciones"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

# =============================================================================
# Eliminación de prefijos de idioma
# El sitio nuevo usa Google Translate (no rutas /es/, /en/, /pt/, /fr/, /zh-hans/).
# Las rutas resultantes pasan por las reglas anteriores si existe coincidencia.
# =============================================================================

[[redirects]]
  from = "/es/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/pt/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/fr/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/zh-hans/*"
  to = "/:splat"
  status = 301

# Variantes sin slash final
[[redirects]]
  from = "/es"
  to = "/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/"
  status = 301

[[redirects]]
  from = "/pt"
  to = "/"
  status = 301

[[redirects]]
  from = "/fr"
  to = "/"
  status = 301

[[redirects]]
  from = "/zh-hans"
  to = "/"
  status = 301

# =============================================================================
# Cabeceras de seguridad HTTP
# =============================================================================
# NOTA: La CSP usa 'unsafe-inline'/'unsafe-eval' porque Next.js, GTM, Google
# Maps y AOS inyectan scripts/estilos inline. Aun así restringe los dominios
# de origen (script-src/connect-src/frame-src) y bloquea object/base/framing.
# Validar en un Deploy Preview de Netlify antes de tener por definitiva la CSP;
# se puede endurecer migrando a nonces más adelante.
# =============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com https://maps.gstatic.com https://www.google.com https://www.gstatic.com https://translate.google.com https://translate.googleapis.com; connect-src 'self' https://azfacms.geniorama.co https://maps.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://translate.googleapis.com https://*.googleapis.com; frame-src 'self' https://www.youtube.com https://player.vimeo.com https://www.google.com https://td.doubleclick.net https://www.googletagmanager.com; media-src 'self' https: blob:; worker-src 'self' blob:;"
