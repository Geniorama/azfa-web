# -----------------------------------------------------------------------------
# Pagos → Portal de afiliados
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/pagos"
  to = "/portal-afiliados"
  status = 301

# -----------------------------------------------------------------------------
# Haga parte de AZFA → Nuestros afiliados
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/haga-parte-de-azfa"
  to = "/nuestros-afiliados"
  status = 301

# -----------------------------------------------------------------------------
# Index legacy (Joomla)
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/index.php/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/index.php"
  to = "/"
  status = 301

[[redirects]]
  from = "/index"
  to = "/"
  status = 301

# -----------------------------------------------------------------------------
# Estructura antigua de Grav CMS (/user/pages/04.invierta/01.directorio/...)
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/user/pages/*"
  to = "/nuestros-afiliados"
  status = 301

# -----------------------------------------------------------------------------
# Archivos antiguos /media/* (PDFs, revistas, estadísticas-pais)
# y /presentaciones/*
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/media/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

[[redirects]]
  from = "/presentaciones/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

[[redirects]]
  from = "/presentaciones"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

# =============================================================================
# Eliminación de prefijos de idioma
# El sitio nuevo usa Google Translate (no rutas /es/, /en/, /pt/, /fr/, /zh-hans/).
# Las rutas resultantes pasan por las reglas anteriores si existe coincidencia.
# =============================================================================

[[redirects]]
  from = "/es/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/pt/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/fr/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/zh-hans/*"
  to = "/:splat"
  status = 301

# Variantes sin slash final
[[redirects]]
  from = "/es"
  to = "/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/"
  status = 301

[[redirects]]
  from = "/pt"
  to = "/"
  status = 301

[[redirects]]
  from = "/fr"
  to = "/"
  status = 301

[[redirects]]
  from = "/zh-hans"
  to = "/"
  status = 301
