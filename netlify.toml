[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Deshabilitar el escaneo de secretos para keys públicas conocidas
  NETLIFY_SKIP_SECRET_SCANNING = "true"

# =============================================================================
# Redirecciones 301 - URLs heredadas del sitio anterior (Grav CMS)
# Fuente: GSC Coverage Drilldown 2026-05-04
# =============================================================================
# Estrategia:
#   1) Mapear rutas antiguas (sin prefijo de idioma) a rutas del nuevo Next.js.
#   2) Eliminar prefijos /es/, /en/, /pt/, /fr/, /zh-hans/ (el sitio nuevo
#      usa Google Translate, no segmentos de idioma).
# Las rutas existentes en el nuevo sitio (/quienes-somos, /contacto,
# /servicios, /eventos, /sala-de-prensa/*, /invierta-en-zonas-francas/*, etc.)
# NO se interceptan: las reglas sin `force` solo aplican si no existe la ruta.
# =============================================================================

# -----------------------------------------------------------------------------
# Sala de prensa - Noticias
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/informacion/noticias/*"
  to = "/sala-de-prensa/noticias"
  status = 301

[[redirects]]
  from = "/informacion/noticias"
  to = "/sala-de-prensa/noticias"
  status = 301

# Antiguas URLs de Joomla (ej. /es/11-noticias/343-...)
[[redirects]]
  from = "/11-noticias/*"
  to = "/sala-de-prensa/noticias"
  status = 301

# -----------------------------------------------------------------------------
# Sala de prensa - Newsletter / Boletines
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/informacion/boletines"
  to = "/sala-de-prensa/newsletter"
  status = 301

[[redirects]]
  from = "/informacion/boletines/*"
  to = "/sala-de-prensa/newsletter"
  status = 301

# -----------------------------------------------------------------------------
# Webinars y AZFA Talks → Eventos
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/informacion/webinars/*"
  to = "/eventos"
  status = 301

[[redirects]]
  from = "/informacion/webinars"
  to = "/eventos"
  status = 301

# -----------------------------------------------------------------------------
# Estadísticas
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/informacion/estadisticas"
  to = "/invierta-en-zonas-francas/estadisticas"
  status = 301

[[redirects]]
  from = "/informacion/estadisticas/*"
  to = "/invierta-en-zonas-francas/estadisticas"
  status = 301

# -----------------------------------------------------------------------------
# Publicaciones y estudios
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/informacion/publicaciones"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

[[redirects]]
  from = "/informacion/publicaciones/*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

# Cubre /informacion/estudios, /informacion/estudiosBanrep, /informacion/estudios.Banco, etc.
[[redirects]]
  from = "/informacion/estudios*"
  to = "/invierta-en-zonas-francas/publicaciones"
  status = 301

# -----------------------------------------------------------------------------
# Resto de /informacion → noticias por defecto
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/informacion/*"
  to = "/sala-de-prensa/noticias"
  status = 301

[[redirects]]
  from = "/informacion"
  to = "/sala-de-prensa/noticias"
  status = 301

# -----------------------------------------------------------------------------
# Eventos (eventos-proximos, eventos-pasados, eventos-2023, slugs específicos)
# `force = true` es obligatorio: /eventos es una ruta real de Next, por lo que
# su handler "reclama" los sub-paths y devuelve 404 antes de aplicar una
# redirección sin force. Con force, Netlify intercepta /eventos/<algo>.
# (No afecta a /eventos exacto, que no termina en "/".)
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/eventos/*"
  to = "/eventos"
  status = 301
  force = true

# -----------------------------------------------------------------------------
# Invierta - subsecciones
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/invierta/directorio"
  to = "/nuestros-afiliados"
  status = 301

[[redirects]]
  from = "/invierta/directorio/*"
  to = "/nuestros-afiliados"
  status = 301

[[redirects]]
  from = "/invierta/normatividad"
  to = "/invierta-en-zonas-francas/normativa-legal"
  status = 301

[[redirects]]
  from = "/invierta/cifras"
  to = "/invierta-en-zonas-francas/estadisticas"
  status = 301

[[redirects]]
  from = "/invierta/acceda-a-las-zonas-francas"
  to = "/invierta-en-zonas-francas"
  status = 301

[[redirects]]
  from = "/invierta/*"
  to = "/invierta-en-zonas-francas"
  status = 301

[[redirects]]
  from = "/invierta"
  to = "/invierta-en-zonas-francas"
  status = 301

# -----------------------------------------------------------------------------
# Blog (categorías y posts antiguos) → hub del blog en sala de prensa
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/blog/*"
  to = "/sala-de-prensa/blog"
